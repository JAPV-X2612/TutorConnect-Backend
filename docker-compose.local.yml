version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: tutorconnect-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: tutorconnect
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - tutorconnect-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local

networks:
  tutorconnect-network:
    driver: bridge
