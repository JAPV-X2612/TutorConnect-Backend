version: '3.8'

services:
  # PostgreSQL database
  postgres:
    image: pgvector/pgvector:pg16
    container_name: tutorconnect-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: tutorconnect
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init:/docker-entrypoint-initdb.d
    networks:
      - tutorconnect-network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  # NestJS application
  app:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install && npm run start:dev"
    container_name: tutorconnect-backend
    restart: unless-stopped
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: postgresql://postgres:postgres123@postgres:5432/tutorconnect
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: tutorconnect
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres123
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY:-}
      CLERK_WEBHOOK_SECRET: ${CLERK_WEBHOOK_SECRET:-}
      AUTH_SECRET: your-super-secret-key-change-in-production
      JWT_EXPIRATION: 3600
    ports:
      - '3000:3000'
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - tutorconnect-network
    volumes:
      - .:/app
      - /app/node_modules
      - ./logs:/app/logs

# Persistent volumes
volumes:
  postgres_data:
    driver: local

# Network for communication between services
networks:
  tutorconnect-network:
    driver: bridge
